<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRUE — Bubble Level</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --graphite: #1b1d1e;
    --panel: #232628;
    --panel-raised: #2b2f31;
    --bezel: #141617;
    --phosphor: #6ef0a8;
    --phosphor-dim: #2f5c47;
    --amber: #ffb454;
    --danger: #ff6b5d;
    --ink: #e9e7e0;
    --ink-dim: #8b9091;
    --ring: #3a3f42;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    height: 100%;
    margin: 0;
    background: var(--graphite);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 20px) 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
    background:
      radial-gradient(ellipse at 50% -10%, #262a2c 0%, var(--graphite) 55%);
  }

  header{
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 10px 2px 0;
  }

  .wordmark{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.34em;
    color: var(--ink-dim);
  }
  .wordmark b{ color: var(--phosphor); font-weight: 600; }

  .status-dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ring);
    box-shadow: none;
    transition: background .3s, box-shadow .3s;
  }
  .status-dot.live{
    background: var(--phosphor);
    box-shadow: 0 0 8px 1px var(--phosphor);
  }

  main{
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 34px;
    min-height: 0;
  }

  .readout{
    display: flex;
    gap: 28px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .readout .field{ text-align: center; }
  .readout .value{
    font-size: 34px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    transition: color .15s;
    color: var(--ink);
  }
  .readout .value.flat{ color: var(--phosphor); }
  .readout .unit{ font-size: 18px; color: var(--ink-dim); font-weight: 400; }
  .readout .label{
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--ink-dim);
  }

  .vial-wrap{
    position: relative;
    width: min(78vw, 320px);
    height: min(78vw, 320px);
  }

  .bezel{
    position: absolute; inset: 0;
    border-radius: 50%;
    background: linear-gradient(155deg, #33383a, #17181a 55%, #0e0f10);
    box-shadow:
      0 18px 40px -14px rgba(0,0,0,0.65),
      inset 0 1px 1px rgba(255,255,255,0.08),
      inset 0 -2px 6px rgba(0,0,0,0.6);
  }

  .glass{
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #1f2323, #101213 70%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.05),
      inset 0 12px 24px -10px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .glass canvas{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .controls{
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .tare-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--ink);
    background: linear-gradient(180deg, var(--panel-raised), var(--panel));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 15px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow:
      0 6px 14px -6px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
    cursor: pointer;
    transition: transform .08s, box-shadow .08s;
  }
  .tare-btn:active{
    transform: translateY(1px) scale(0.98);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .tare-btn svg{ width: 15px; height: 15px; stroke: var(--amber); }
  .tare-btn.active-flash{ color: var(--phosphor); }

  .reset-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    background: none;
    border: none;
    padding: 8px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--ring);
  }

  footer{
    width: 100%;
    max-width: 420px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
  }

  .permission-gate{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }
  .permission-gate p{
    max-width: 280px;
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.5;
    margin: 0;
  }
  .primary-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.1em;
    font-size: 13px;
    color: var(--bezel);
    background: var(--phosphor);
    border: none;
    border-radius: 10px;
    padding: 14px 26px;
    cursor: pointer;
  }
  .hidden{ display: none !important; }

  .torpedo-wrap{
    position: relative;
    width: min(78vw, 320px);
    height: 92px;
    border-radius: 16px;
  }
  .torpedo-wrap .bezel{ border-radius: 16px; }
  .torpedo-wrap .glass{ inset: 10px; border-radius: 10px; }

  .mode-label{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--amber);
    margin-bottom: -14px;
    opacity: 0.85;
  }

  .readout .field.hide-field{
    width: 0;
    opacity: 0;
    overflow: hidden;
    margin: 0;
    pointer-events: none;
  }

  .stage{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: opacity .25s ease;
  }
</style>
</head>
<body>

  <header>
    <div class="wordmark"><b>TRUE</b>·LEVEL</div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <main>

    <div class="permission-gate hidden" id="permGate">
      <p>Your browser requires permission to read motion &amp; orientation sensors.</p>
      <button class="primary-btn" id="permBtn">ENABLE SENSORS</button>
    </div>

    <div id="levelUI" class="hidden" style="display:contents;">
      <div class="stage">
        <div class="mode-label hidden" id="modeLabel">ON EDGE · SINGLE AXIS</div>

        <div class="readout">
          <div class="field" id="fieldX">
            <div class="value" id="valX">0.0<span class="unit">°</span></div>
            <div class="label" id="labelX">SIDE&nbsp;&nbsp;X</div>
          </div>
          <div class="field" id="fieldY">
            <div class="value" id="valY">0.0<span class="unit">°</span></div>
            <div class="label">FRONT&nbsp;Y</div>
          </div>
        </div>

        <div class="vial-wrap" id="bullseyeWrap">
          <div class="bezel"></div>
          <div class="glass">
            <canvas id="canvas"></canvas>
          </div>
        </div>

        <div class="torpedo-wrap hidden" id="torpedoWrap">
          <div class="bezel"></div>
          <div class="glass">
            <canvas id="torpedoCanvas"></canvas>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="tare-btn" id="tareBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
          TARE
        </button>
        <button class="reset-btn" id="resetBtn">clear tare</button>
      </div>
    </div>

  </main>

  <footer id="footerMsg">Rest your phone on a surface and hold steady.</footer>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const torpedoCanvas = document.getElementById('torpedoCanvas');
  const tctx = torpedoCanvas.getContext('2d');
  const valX = document.getElementById('valX');
  const valY = document.getElementById('valY');
  const fieldX = document.getElementById('fieldX');
  const fieldY = document.getElementById('fieldY');
  const labelX = document.getElementById('labelX');
  const modeLabel = document.getElementById('modeLabel');
  const bullseyeWrap = document.getElementById('bullseyeWrap');
  const torpedoWrap = document.getElementById('torpedoWrap');
  const statusDot = document.getElementById('statusDot');
  const footerMsg = document.getElementById('footerMsg');
  const tareBtn = document.getElementById('tareBtn');
  const resetBtn = document.getElementById('resetBtn');
  const permGate = document.getElementById('permGate');
  const permBtn = document.getElementById('permBtn');
  const levelUI = document.getElementById('levelUI');

  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let size = 0;
  let tSize = { w: 0, h: 0 };

  function resize(){
    const rect = canvas.parentElement.getBoundingClientRect();
    size = rect.width;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const trect = torpedoCanvas.parentElement.getBoundingClientRect();
    tSize.w = trect.width; tSize.h = trect.height;
    torpedoCanvas.width = tSize.w * dpr;
    torpedoCanvas.height = tSize.h * dpr;
    tctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  let tareX = 0, tareY = 0;
  let tareTorpedo = 0;
  let rawX = 0, rawY = 0;
  let smoothX = 0, smoothY = 0;
  let haveReading = false;

  function handleOrientation(e){
    if (e.beta === null || e.gamma === null) return;
    haveReading = true;
    rawY = e.beta;
    rawX = e.gamma;
    if (!statusDot.classList.contains('live')) statusDot.classList.add('live');
  }

  let gx = 0, gy = 0, gz = -9.81;
  let haveMotion = false;
  let torpedoAngleRaw = 0;
  let inTorpedoMode = false;
  const ENTER_EDGE_RATIO = 0.82;
  const EXIT_EDGE_RATIO = 0.68;

  function handleMotion(e){
    const a = e.accelerationIncludingGravity;
    if (!a || a.x === null) return;
    haveMotion = true;
    gx += (a.x - gx) * 0.18;
    gy += (a.y - gy) * 0.18;
    gz += (a.z - gz) * 0.18;

    const mag = Math.sqrt(gx*gx + gy*gy + gz*gz) || 1;
    const screenPlane = Math.max(Math.abs(gx), Math.abs(gy));
    const edgeRatio = screenPlane / mag;

    if (!inTorpedoMode && edgeRatio > ENTER_EDGE_RATIO) inTorpedoMode = true;
    else if (inTorpedoMode && edgeRatio < EXIT_EDGE_RATIO) inTorpedoMode = false;

    const dominant = Math.abs(gx) >= Math.abs(gy) ? Math.abs(gx) : Math.abs(gy);
    torpedoAngleRaw = Math.atan2(gz, dominant) * 180 / Math.PI;
  }

  let lastMode = null;

  function loop(){
    const showTorpedo = haveMotion && inTorpedoMode;

    if (showTorpedo !== lastMode){
      lastMode = showTorpedo;
      bullseyeWrap.classList.toggle('hidden', showTorpedo);
      torpedoWrap.classList.toggle('hidden', !showTorpedo);
      modeLabel.classList.toggle('hidden', !showTorpedo);
      fieldY.classList.toggle('hide-field', showTorpedo);
      labelX.innerHTML = showTorpedo ? 'PLUMB' : 'SIDE&nbsp;&nbsp;X';
    }

    if (showTorpedo){
      const t = clamp(torpedoAngleRaw - tareTorpedo, -45, 45);
      drawTorpedo(t);
      const flat = Math.abs(t) < 0.6;
      valX.innerHTML = fmt(t) + '<span class="unit">°</span>';
      valX.classList.toggle('flat', flat);
      footerMsg.textContent = flat ? 'Plumb.' : 'Rotate the phone until the bubble centers.';
    } else {
      smoothX += (rawX - smoothX) * 0.25;
      smoothY += (rawY - smoothY) * 0.25;

      const x = clamp(smoothX - tareX, -45, 45);
      const y = clamp(smoothY - tareY, -45, 45);

      draw(x, y);

      const flat = Math.abs(x) < 0.6 && Math.abs(y) < 0.6;
      valX.innerHTML = fmt(x) + '<span class="unit">°</span>';
      valY.innerHTML = fmt(y) + '<span class="unit">°</span>';
      valX.classList.toggle('flat', flat);
      valY.classList.toggle('flat', flat);

      if (haveReading){
        footerMsg.textContent = flat ? 'Level.' : 'Tilt the phone until the bubble centers.';
      }
    }

    requestAnimationFrame(loop);
  }

  function fmt(v){
    const s = v.toFixed(1);
    return (v > 0 ? '+' : '') + s;
  }
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  function draw(xDeg, yDeg){
    if (!size) resize();
    const w = size, h = size;
    ctx.clearRect(0,0,w,h);

    const cx = w/2, cy = h/2;
    const R = w/2 - 2;

    ctx.strokeStyle = 'rgba(233,231,224,0.08)';
    ctx.lineWidth = 1;
    [0.98, 0.66, 0.34].forEach(f=>{
      ctx.beginPath();
      ctx.arc(cx, cy, R*f, 0, Math.PI*2);
      ctx.stroke();
    });
    ctx.beginPath();
    ctx.moveTo(cx - R*0.98, cy); ctx.lineTo(cx + R*0.98, cy);
    ctx.moveTo(cx, cy - R*0.98); ctx.lineTo(cx, cy + R*0.98);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,180,84,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, R*0.20, 0, Math.PI*2);
    ctx.stroke();

    const maxDeg = 30;
    const px = clamp(xDeg / maxDeg, -1, 1) * (R*0.7);
    const py = clamp(yDeg / maxDeg, -1, 1) * (R*0.7);

    const flat = Math.abs(xDeg) < 0.6 && Math.abs(yDeg) < 0.6;
    const bubbleColor = flat ? '#6ef0a8' : '#ffb454';

    ctx.beginPath();
    ctx.ellipse(cx+px, cy+py+3, 26, 24, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();

    const grad = ctx.createRadialGradient(cx+px-6, cy+py-6, 2, cx+px, cy+py, 30);
    grad.addColorStop(0, flat ? 'rgba(180,255,220,0.95)' : 'rgba(255,220,170,0.95)');
    grad.addColorStop(0.55, bubbleColor);
    grad.addColorStop(1, flat ? '#2f5c47' : '#7a5327');
    ctx.beginPath();
    ctx.arc(cx+px, cy+py, 26, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.shadowColor = bubbleColor;
    ctx.shadowBlur = flat ? 22 : 10;
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.ellipse(cx+px-9, cy+py-9, 6, 4, -0.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();
  }

  function drawTorpedo(deg){
    if (!tSize.w) resize();
    const w = tSize.w, h = tSize.h;
    tctx.clearRect(0,0,w,h);

    const midY = h/2;
    const travel = (w/2) - 34;

    tctx.strokeStyle = 'rgba(233,231,224,0.10)';
    tctx.lineWidth = 1;
    tctx.beginPath();
    tctx.moveTo(20, midY); tctx.lineTo(w-20, midY);
    tctx.stroke();

    tctx.strokeStyle = 'rgba(233,231,224,0.16)';
    for (let i=-4;i<=4;i++){
      const tx = w/2 + (i/4)*travel;
      const th = i===0 ? 16 : 8;
      tctx.beginPath();
      tctx.moveTo(tx, midY-th); tctx.lineTo(tx, midY+th);
      tctx.stroke();
    }
    tctx.strokeStyle = 'rgba(255,180,84,0.55)';
    tctx.lineWidth = 1.5;
    tctx.beginPath();
    tctx.moveTo(w/2-3, midY-20); tctx.lineTo(w/2-3, midY+20);
    tctx.moveTo(w/2+3, midY-20); tctx.lineTo(w/2+3, midY+20);
    tctx.stroke();

    const maxDeg = 25;
    const bx = w/2 + clamp(deg / maxDeg, -1, 1) * travel;

    const flat = Math.abs(deg) < 0.6;
    const bubbleColor = flat ? '#6ef0a8' : '#ffb454';

    tctx.beginPath();
    tctx.ellipse(bx, midY+3, 22, 18, 0, 0, Math.PI*2);
    tctx.fillStyle = 'rgba(0,0,0,0.35)';
    tctx.fill();

    const grad = tctx.createRadialGradient(bx-5, midY-5, 2, bx, midY, 22);
    grad.addColorStop(0, flat ? 'rgba(180,255,220,0.95)' : 'rgba(255,220,170,0.95)');
    grad.addColorStop(0.55, bubbleColor);
    grad.addColorStop(1, flat ? '#2f5c47' : '#7a5327');
    tctx.beginPath();
    tctx.ellipse(bx, midY, 20, 18, 0, 0, Math.PI*2);
    tctx.fillStyle = grad;
    tctx.shadowColor = bubbleColor;
    tctx.shadowBlur = flat ? 20 : 8;
    tctx.fill();
    tctx.shadowBlur = 0;

    tctx.beginPath();
    tctx.ellipse(bx-6, midY-6, 5, 3, -0.6, 0, Math.PI*2);
    tctx.fillStyle = 'rgba(255,255,255,0.55)';
    tctx.fill();
  }

  tareBtn.addEventListener('click', ()=>{
    tareX = rawX;
    tareY = rawY;
    tareTorpedo = torpedoAngleRaw;
    tareBtn.classList.add('active-flash');
    setTimeout(()=>tareBtn.classList.remove('active-flash'), 400);
  });
  resetBtn.addEventListener('click', ()=>{
    tareX = 0; tareY = 0; tareTorpedo = 0;
  });

  function startSensors(){
    window.addEventListener('deviceorientation', handleOrientation, true);
    window.addEventListener('devicemotion', handleMotion, true);
    levelUI.classList.remove('hidden');
    permGate.classList.add('hidden');
    resize();
    requestAnimationFrame(loop);
    setTimeout(()=>{
      if (!haveReading){
        footerMsg.textContent = 'No sensor data detected. Your device or browser may not support this.';
      }
    }, 2500);
  }

  function needsIOSPermission(){
    return (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') ||
           (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function');
  }

  if (needsIOSPermission()){
    permGate.classList.remove('hidden');
    permBtn.addEventListener('click', ()=>{
      const requests = [];
      if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission){
        requests.push(DeviceOrientationEvent.requestPermission());
      }
      if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission){
        requests.push(DeviceMotionEvent.requestPermission());
      }
      Promise.all(requests).then(states=>{
        if (states.every(s => s === 'granted')){
          startSensors();
        } else {
          footerMsg.textContent = 'Permission denied. Enable motion access in Settings to use the level.';
        }
      }).catch(()=>{
        footerMsg.textContent = 'Could not request sensor permission.';
      });
    });
  } else {
    startSensors();
  }
})();
</script>
</body>
</html>
