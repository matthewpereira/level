<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEVEL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg: #ffffff;
    --ink: #0a0a0a;
    --accent: #ff2400;
    --ok: #0a0a0a;
    --line: #0a0a0a;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
  }

  main{
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
  }

  .mode-label{
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
    padding: 8px 0;
    border: 3px solid var(--line);
    border-bottom: none;
  }
  .mode-label.hidden{ display: none; }

  /* --- Readout --- */
  .readout{
    display: flex;
    border: 3px solid var(--line);
  }
  .readout .field{
    flex: 1;
    text-align: center;
    padding: 18px 8px 14px;
  }
  .readout .field + .field{ border-left: 3px solid var(--line); }
  .readout .value{
    font-family: 'Archivo Black', sans-serif;
    font-size: 15vw;
    line-height: 0.9;
    max-font-size: 64px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .readout .value.flat{ color: var(--accent); }
  .readout .unit{ font-size: 0.5em; }
  .readout .label{
    margin-top: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* --- Bullseye vial --- */
  .vial-wrap{
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 3px solid var(--line);
    border-top: none;
  }

  .vial-wrap canvas{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* --- Torpedo stack --- */
  .torpedo-stack{
    display: flex;
    flex-direction: column;
  }
  .torpedo-stack.hidden{ display: none; }

  .torpedo-row{
    display: flex;
    align-items: stretch;
    border: 3px solid var(--line);
    border-top: none;
  }
  .torpedo-tag{
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 6px;
    border-right: 3px solid var(--line);
    flex-shrink: 0;
  }
  .torpedo-wrap{
    position: relative;
    flex: 1;
    height: 110px;
  }
  .torpedo-wrap canvas{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* --- Controls --- */
  .controls{
    display: flex;
    border: 3px solid var(--line);
    border-top: none;
  }

  .tare-btn{
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: var(--bg);
    background: var(--ink);
    border: none;
    padding: 20px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform .05s;
  }
  .tare-btn:active{ transform: scale(0.97); }

  .reset-btn{
    flex: 0 0 auto;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--ink);
    background: var(--bg);
    border: none;
    border-left: 3px solid var(--line);
    padding: 20px 18px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .reset-btn:active{ background: var(--ink); color: var(--bg); }

  .permission-gate{
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 3px solid var(--line);
  }
  .permission-gate p{
    margin: 0;
    padding: 20px 16px;
    font-size: 13px;
    line-height: 1.5;
    border-bottom: 3px solid var(--line);
  }
  .primary-btn{
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.14em;
    font-size: 14px;
    color: var(--bg);
    background: var(--ink);
    border: none;
    padding: 20px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .primary-btn:active{ background: var(--accent); }

  .hidden{ display: none !important; }

  .err-msg{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 10px 8px;
    border: 3px solid var(--line);
    border-top: none;
  }
  .err-msg:empty{ display: none; }
</style>
</head>
<body>

  <main>

    <div class="permission-gate hidden" id="permGate">
      <p>SENSOR PERMISSION REQUIRED.</p>
      <button class="primary-btn" id="permBtn">ENABLE SENSORS</button>
    </div>

    <div id="levelUI" class="hidden" style="display:contents;">
      <div class="mode-label hidden" id="modeLabel">ON EDGE — DUAL AXIS</div>

      <div class="readout">
        <div class="field" id="fieldX">
          <div class="value" id="valX">0.0<span class="unit">°</span></div>
          <div class="label" id="labelX">SIDE X</div>
        </div>
        <div class="field" id="fieldY">
          <div class="value" id="valY">0.0<span class="unit">°</span></div>
          <div class="label" id="labelY">FRONT Y</div>
        </div>
      </div>

      <div class="vial-wrap" id="bullseyeWrap">
        <canvas id="canvas"></canvas>
      </div>

      <div class="torpedo-stack hidden" id="torpedoStack">
        <div class="torpedo-row">
          <span class="torpedo-tag">LEVEL</span>
          <div class="torpedo-wrap" id="torpedoWrap">
            <canvas id="torpedoCanvas"></canvas>
          </div>
        </div>
        <div class="torpedo-row">
          <span class="torpedo-tag">LEAN</span>
          <div class="torpedo-wrap" id="torpedoWrap2">
            <canvas id="torpedoCanvas2"></canvas>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="tare-btn" id="tareBtn">TARE</button>
        <button class="reset-btn" id="resetBtn">CLEAR</button>
      </div>

      <div class="err-msg" id="footerMsg"></div>
    </div>

  </main>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const torpedoCanvas = document.getElementById('torpedoCanvas');
  const tctx = torpedoCanvas.getContext('2d');
  const torpedoCanvas2 = document.getElementById('torpedoCanvas2');
  const tctx2 = torpedoCanvas2.getContext('2d');
  const valX = document.getElementById('valX');
  const valY = document.getElementById('valY');
  const fieldX = document.getElementById('fieldX');
  const fieldY = document.getElementById('fieldY');
  const labelX = document.getElementById('labelX');
  const labelY = document.getElementById('labelY');
  const modeLabel = document.getElementById('modeLabel');
  const bullseyeWrap = document.getElementById('bullseyeWrap');
  const torpedoStack = document.getElementById('torpedoStack');
  const footerMsg = document.getElementById('footerMsg');
  const tareBtn = document.getElementById('tareBtn');
  const resetBtn = document.getElementById('resetBtn');
  const permGate = document.getElementById('permGate');
  const permBtn = document.getElementById('permBtn');
  const levelUI = document.getElementById('levelUI');

  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let size = 0;
  let tSize = { w: 0, h: 0 };
  let tSize2 = { w: 0, h: 0 };

  function resize(){
    const rect = canvas.parentElement.getBoundingClientRect();
    size = rect.width;
    canvas.width = size * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const trect = torpedoCanvas.parentElement.getBoundingClientRect();
    tSize.w = trect.width; tSize.h = trect.height;
    torpedoCanvas.width = tSize.w * dpr;
    torpedoCanvas.height = tSize.h * dpr;
    tctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const trect2 = torpedoCanvas2.parentElement.getBoundingClientRect();
    tSize2.w = trect2.width; tSize2.h = trect2.height;
    torpedoCanvas2.width = tSize2.w * dpr;
    torpedoCanvas2.height = tSize2.h * dpr;
    tctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  let tareX = 0, tareY = 0;
  let tareLevel = 0, tareLean = 0;
  let rawX = 0, rawY = 0;
  let smoothX = 0, smoothY = 0;
  let haveReading = false;

  function handleOrientation(e){
    if (e.beta === null || e.gamma === null) return;
    haveReading = true;
    rawY = e.beta;
    rawX = e.gamma;
  }

  let gx = 0, gy = 0, gz = -9.81;
  let haveMotion = false;
  let torpedoLevelRaw = 0;
  let torpedoLeanRaw = 0;
  let inTorpedoMode = false;
  const ENTER_EDGE_RATIO = 0.82;
  const EXIT_EDGE_RATIO = 0.68;

  function handleMotion(e){
    const a = e.accelerationIncludingGravity;
    if (!a || a.x === null) return;
    haveMotion = true;
    gx += (a.x - gx) * 0.18;
    gy += (a.y - gy) * 0.18;
    gz += (a.z - gz) * 0.18;

    const mag = Math.sqrt(gx*gx + gy*gy + gz*gz) || 1;
    const screenPlane = Math.max(Math.abs(gx), Math.abs(gy));
    const edgeRatio = screenPlane / mag;

    if (!inTorpedoMode && edgeRatio > ENTER_EDGE_RATIO) inTorpedoMode = true;
    else if (inTorpedoMode && edgeRatio < EXIT_EDGE_RATIO) inTorpedoMode = false;

    const dominantIsX = Math.abs(gx) >= Math.abs(gy);
    const dominantMag = dominantIsX ? gx : gy;
    const other = dominantIsX ? gy : gx;

    torpedoLevelRaw = Math.atan2(other, Math.abs(dominantMag)) * 180 / Math.PI;
    torpedoLeanRaw = Math.atan2(gz, Math.abs(dominantMag)) * 180 / Math.PI;
  }

  let lastMode = null;

  function loop(){
    const showTorpedo = haveMotion && inTorpedoMode;

    if (showTorpedo !== lastMode){
      lastMode = showTorpedo;
      bullseyeWrap.classList.toggle('hidden', showTorpedo);
      torpedoStack.classList.toggle('hidden', !showTorpedo);
      modeLabel.classList.toggle('hidden', !showTorpedo);
      labelX.textContent = showTorpedo ? 'LEVEL' : 'SIDE X';
      labelY.textContent = showTorpedo ? 'LEAN' : 'FRONT Y';
      resize();
    }

    if (showTorpedo){
      const level = clamp(torpedoLevelRaw - tareLevel, -45, 45);
      const lean = clamp(torpedoLeanRaw - tareLean, -45, 45);
      drawTorpedo(tctx, tSize, level);
      drawTorpedo(tctx2, tSize2, lean);

      const levelFlat = Math.abs(level) < 0.6;
      const leanFlat = Math.abs(lean) < 0.6;
      valX.innerHTML = fmt(level) + '<span class="unit">°</span>';
      valY.innerHTML = fmt(lean) + '<span class="unit">°</span>';
      valX.classList.toggle('flat', levelFlat);
      valY.classList.toggle('flat', leanFlat);
    } else {
      smoothX += (rawX - smoothX) * 0.25;
      smoothY += (rawY - smoothY) * 0.25;

      const x = clamp(smoothX - tareX, -45, 45);
      const y = clamp(smoothY - tareY, -45, 45);

      draw(x, y);

      const flat = Math.abs(x) < 0.6 && Math.abs(y) < 0.6;
      valX.innerHTML = fmt(x) + '<span class="unit">°</span>';
      valY.innerHTML = fmt(y) + '<span class="unit">°</span>';
      valX.classList.toggle('flat', flat);
      valY.classList.toggle('flat', flat);
    }

    requestAnimationFrame(loop);
  }

  function fmt(v){
    const s = v.toFixed(1);
    return (v > 0 ? '+' : '') + s;
  }
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  function draw(xDeg, yDeg){
    if (!size) resize();
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    ctx.clearRect(0,0,w,h);

    const cx = w/2, cy = h/2;
    const R = Math.min(w,h)/2 - 6;

    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2;

    // crosshair
    ctx.beginPath();
    ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy);
    ctx.moveTo(cx, cy - R); ctx.lineTo(cx, cy + R);
    ctx.stroke();

    // outer ring (flat, hard)
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.stroke();

    // target square (center)
    ctx.lineWidth = 2;
    const tR = R*0.22;
    ctx.strokeRect(cx-tR, cy-tR, tR*2, tR*2);

    const maxDeg = 30;
    const px = clamp(xDeg / maxDeg, -1, 1) * (R*0.7);
    const py = clamp(yDeg / maxDeg, -1, 1) * (R*0.7);

    const flat = Math.abs(xDeg) < 0.6 && Math.abs(yDeg) < 0.6;
    const bubbleColor = flat ? '#0a0a0a' : '#ff2400';
    const bR = 26;

    ctx.fillStyle = bubbleColor;
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx+px, cy+py, bR, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
  }

  function drawTorpedo(c, sz, deg){
    if (!sz.w) resize();
    const w = sz.w, h = sz.h;
    c.clearRect(0,0,w,h);

    const midY = h/2;
    const travel = (w/2) - 30;

    c.strokeStyle = '#0a0a0a';
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(16, midY); c.lineTo(w-16, midY);
    c.stroke();

    for (let i=-4;i<=4;i++){
      const tx = w/2 + (i/4)*travel;
      const th = i===0 ? 18 : 9;
      c.lineWidth = i===0 ? 3 : 2;
      c.beginPath();
      c.moveTo(tx, midY-th); c.lineTo(tx, midY+th);
      c.stroke();
    }

    const maxDeg = 25;
    const bx = w/2 + clamp(deg / maxDeg, -1, 1) * travel;

    const flat = Math.abs(deg) < 0.6;
    const bubbleColor = flat ? '#0a0a0a' : '#ff2400';
    const bR = 17;

    c.fillStyle = bubbleColor;
    c.strokeStyle = '#0a0a0a';
    c.lineWidth = 3;
    c.beginPath();
    c.arc(bx, midY, bR, 0, Math.PI*2);
    c.fill();
    c.stroke();
  }

  tareBtn.addEventListener('click', ()=>{
    tareX = rawX;
    tareY = rawY;
    tareLevel = torpedoLevelRaw;
    tareLean = torpedoLeanRaw;
  });
  resetBtn.addEventListener('click', ()=>{
    tareX = 0; tareY = 0; tareLevel = 0; tareLean = 0;
  });

  function startSensors(){
    window.addEventListener('deviceorientation', handleOrientation, true);
    window.addEventListener('devicemotion', handleMotion, true);
    levelUI.classList.remove('hidden');
    permGate.classList.add('hidden');
    resize();
    requestAnimationFrame(loop);
    setTimeout(()=>{
      if (!haveReading){
        footerMsg.textContent = 'NO SENSOR DATA DETECTED.';
      }
    }, 2500);
  }

  function needsIOSPermission(){
    return (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') ||
           (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function');
  }

  if (needsIOSPermission()){
    permGate.classList.remove('hidden');
    permBtn.addEventListener('click', ()=>{
      const requests = [];
      if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission){
        requests.push(DeviceOrientationEvent.requestPermission());
      }
      if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission){
        requests.push(DeviceMotionEvent.requestPermission());
      }
      Promise.all(requests).then(states=>{
        if (states.every(s => s === 'granted')){
          startSensors();
        } else {
          permGate.querySelector('p').textContent = 'PERMISSION DENIED. ENABLE MOTION ACCESS IN SETTINGS.';
        }
      }).catch(()=>{
        permGate.querySelector('p').textContent = 'COULD NOT REQUEST PERMISSION.';
      });
    });
  } else {
    startSensors();
  }
})();
</script>
</body>
</html>
