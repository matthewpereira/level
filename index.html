<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEVEL</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main>

    <div class="permission-gate hidden" id="permGate">
      <p>SENSOR PERMISSION REQUIRED.</p>
      <button class="primary-btn" id="permBtn">ENABLE SENSORS</button>
    </div>

    <div id="levelUI" class="hidden" style="display:contents;">
      <div class="info">
        <div class="switch" id="flatSwitch" role="group" aria-label="Flat display mode">
          <button type="button" class="seg is-active" id="segBullseye" data-view="bullseye">BULLSEYE</button>
          <button type="button" class="seg" id="segTorpedo" data-view="torpedo">TORPEDO</button>
        </div>
        <div class="mode-label hidden" id="modeBanner">ON EDGE — DUAL AXIS</div>

        <div class="readout">
          <div class="field" id="fieldX">
            <div class="value" id="valX">0.0<span class="unit">°</span></div>
            <div class="label" id="labelX">SIDE X</div>
          </div>
          <div class="field" id="fieldY">
            <div class="value" id="valY">0.0<span class="unit">°</span></div>
            <div class="label" id="labelY">FRONT Y</div>
          </div>
        </div>
      </div>

      <div class="vial-wrap" id="bullseyeWrap">
        <span class="vial-tag">BULLSEYE</span>
        <div class="vial-canvas">
          <canvas id="canvas"></canvas>
        </div>
      </div>

      <div class="torpedo-stack hidden" id="torpedoStack">
        <div class="torpedo-row">
          <span class="torpedo-tag" id="torpedoTag1">LEVEL</span>
          <div class="torpedo-wrap" id="torpedoWrap">
            <canvas id="torpedoCanvas"></canvas>
          </div>
        </div>
        <div class="torpedo-row">
          <span class="torpedo-tag" id="torpedoTag2">LEAN</span>
          <div class="torpedo-wrap" id="torpedoWrap2">
            <canvas id="torpedoCanvas2"></canvas>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="tare-btn" id="tareBtn">TARE</button>
        <button class="reset-btn" id="resetBtn">CLEAR</button>
      </div>

      <div class="err-msg" id="footerMsg"></div>
    </div>

  </main>

<script type="module" src="js/main.js"></script>
</body>
</html>
