<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRUE — Bubble Level</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --graphite: #1b1d1e;
    --panel: #232628;
    --panel-raised: #2b2f31;
    --bezel: #141617;
    --phosphor: #6ef0a8;
    --phosphor-dim: #2f5c47;
    --amber: #ffb454;
    --danger: #ff6b5d;
    --ink: #e9e7e0;
    --ink-dim: #8b9091;
    --ring: #3a3f42;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    height: 100%;
    margin: 0;
    background: var(--graphite);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 20px) 20px calc(env(safe-area-inset-bottom, 20px) + 12px);
    background:
      radial-gradient(ellipse at 50% -10%, #262a2c 0%, var(--graphite) 55%);
  }

  header{
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 10px 2px 0;
  }

  .wordmark{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.34em;
    color: var(--ink-dim);
  }
  .wordmark b{ color: var(--phosphor); font-weight: 600; }

  .status-dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ring);
    box-shadow: none;
    transition: background .3s, box-shadow .3s;
  }
  .status-dot.live{
    background: var(--phosphor);
    box-shadow: 0 0 8px 1px var(--phosphor);
  }

  main{
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 34px;
    min-height: 0;
  }

  /* --- Readout --- */
  .readout{
    display: flex;
    gap: 28px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .readout .field{ text-align: center; }
  .readout .value{
    font-size: 34px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    transition: color .15s;
    color: var(--ink);
  }
  .readout .value.flat{ color: var(--phosphor); }
  .readout .unit{ font-size: 18px; color: var(--ink-dim); font-weight: 400; }
  .readout .label{
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--ink-dim);
  }

  /* --- Bullseye vial --- */
  .vial-wrap{
    position: relative;
    width: min(78vw, 320px);
    height: min(78vw, 320px);
  }

  .bezel{
    position: absolute; inset: 0;
    border-radius: 50%;
    background: linear-gradient(155deg, #33383a, #17181a 55%, #0e0f10);
    box-shadow:
      0 18px 40px -14px rgba(0,0,0,0.65),
      inset 0 1px 1px rgba(255,255,255,0.08),
      inset 0 -2px 6px rgba(0,0,0,0.6);
  }

  .glass{
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #1f2323, #101213 70%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.05),
      inset 0 12px 24px -10px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .glass canvas{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* --- Tare button --- */
  .controls{
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .tare-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--ink);
    background: linear-gradient(180deg, var(--panel-raised), var(--panel));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 15px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow:
      0 6px 14px -6px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
    cursor: pointer;
    transition: transform .08s, box-shadow .08s;
  }
  .tare-btn:active{
    transform: translateY(1px) scale(0.98);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .tare-btn svg{ width: 15px; height: 15px; stroke: var(--amber); }
  .tare-btn.active-flash{ color: var(--phosphor); }

  .reset-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    background: none;
    border: none;
    padding: 8px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--ring);
  }

  footer{
    width: 100%;
    max-width: 420px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
  }

  .permission-gate{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }
  .permission-gate p{
    max-width: 280px;
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.5;
    margin: 0;
  }
  .primary-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.1em;
    font-size: 13px;
    color: var(--bezel);
    background: var(--phosphor);
    border: none;
    border-radius: 10px;
    padding: 14px 26px;
    cursor: pointer;
  }
  .hidden{ display: none !important; }
</style>
</head>
<body>

  <header>
    <div class="wordmark"><b>TRUE</b>·LEVEL</div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <main>

    <!-- Permission gate (iOS) -->
    <div class="permission-gate hidden" id="permGate">
      <p>Your browser requires permission to read motion &amp; orientation sensors.</p>
      <button class="primary-btn" id="permBtn">ENABLE SENSORS</button>
    </div>

    <div id="levelUI" class="hidden" style="display:contents;">
      <div class="readout">
        <div class="field">
          <div class="value" id="valX">0.0<span class="unit">°</span></div>
          <div class="label">SIDE&nbsp;&nbsp;X</div>
        </div>
        <div class="field">
          <div class="value" id="valY">0.0<span class="unit">°</span></div>
          <div class="label">FRONT&nbsp;Y</div>
        </div>
      </div>

      <div class="vial-wrap">
        <div class="bezel"></div>
        <div class="glass">
          <canvas id="canvas"></canvas>
        </div>
      </div>

      <div class="controls">
        <button class="tare-btn" id="tareBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
          TARE
        </button>
        <button class="reset-btn" id="resetBtn">clear tare</button>
      </div>
    </div>

  </main>

  <footer id="footerMsg">Rest your phone on a surface and hold steady.</footer>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const valX = document.getElementById('valX');
  const valY = document.getElementById('valY');
  const statusDot = document.getElementById('statusDot');
  const footerMsg = document.getElementById('footerMsg');
  const tareBtn = document.getElementById('tareBtn');
  const resetBtn = document.getElementById('resetBtn');
  const permGate = document.getElementById('permGate');
  const permBtn = document.getElementById('permBtn');
  const levelUI = document.getElementById('levelUI');

  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let size = 0;

  function resize(){
    const rect = canvas.parentElement.getBoundingClientRect();
    size = rect.width;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  // tare offsets
  let tareX = 0, tareY = 0;
  let rawX = 0, rawY = 0; // beta (front/back), gamma (left/right)
  let smoothX = 0, smoothY = 0;
  let haveReading = false;

  function handleOrientation(e){
    if (e.beta === null || e.gamma === null) return;
    haveReading = true;
    rawY = e.beta;
    rawX = e.gamma;
    if (!statusDot.classList.contains('live')) statusDot.classList.add('live');
  }

  function loop(){
    smoothX += (rawX - smoothX) * 0.25;
    smoothY += (rawY - smoothY) * 0.25;

    const x = clamp(smoothX - tareX, -45, 45);
    const y = clamp(smoothY - tareY, -45, 45);

    draw(x, y);

    const flat = Math.abs(x) < 0.6 && Math.abs(y) < 0.6;
    valX.innerHTML = fmt(x) + '<span class="unit">°</span>';
    valY.innerHTML = fmt(y) + '<span class="unit">°</span>';
    valX.classList.toggle('flat', flat);
    valY.classList.toggle('flat', flat);

    if (haveReading){
      footerMsg.textContent = flat ? 'Level.' : 'Tilt the phone until the bubble centers.';
    }

    requestAnimationFrame(loop);
  }

  function fmt(v){
    const s = v.toFixed(1);
    return (v > 0 ? '+' : '') + s;
  }
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  function draw(xDeg, yDeg){
    if (!size) resize();
    const w = size, h = size;
    ctx.clearRect(0,0,w,h);

    const cx = w/2, cy = h/2;
    const R = w/2 - 2;

    ctx.strokeStyle = 'rgba(233,231,224,0.08)';
    ctx.lineWidth = 1;
    [0.98, 0.66, 0.34].forEach(f=>{
      ctx.beginPath();
      ctx.arc(cx, cy, R*f, 0, Math.PI*2);
      ctx.stroke();
    });
    ctx.beginPath();
    ctx.moveTo(cx - R*0.98, cy); ctx.lineTo(cx + R*0.98, cy);
    ctx.moveTo(cx, cy - R*0.98); ctx.lineTo(cx, cy + R*0.98);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,180,84,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, R*0.20, 0, Math.PI*2);
    ctx.stroke();

    const maxDeg = 30;
    const px = clamp(xDeg / maxDeg, -1, 1) * (R*0.7);
    const py = clamp(yDeg / maxDeg, -1, 1) * (R*0.7);

    const flat = Math.abs(xDeg) < 0.6 && Math.abs(yDeg) < 0.6;
    const bubbleColor = flat ? '#6ef0a8' : '#ffb454';

    ctx.beginPath();
    ctx.ellipse(cx+px, cy+py+3, 26, 24, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();

    const grad = ctx.createRadialGradient(cx+px-6, cy+py-6, 2, cx+px, cy+py, 30);
    grad.addColorStop(0, flat ? 'rgba(180,255,220,0.95)' : 'rgba(255,220,170,0.95)');
    grad.addColorStop(0.55, bubbleColor);
    grad.addColorStop(1, flat ? '#2f5c47' : '#7a5327');
    ctx.beginPath();
    ctx.arc(cx+px, cy+py, 26, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.shadowColor = bubbleColor;
    ctx.shadowBlur = flat ? 22 : 10;
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.ellipse(cx+px-9, cy+py-9, 6, 4, -0.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();
  }

  tareBtn.addEventListener('click', ()=>{
    tareX = rawX;
    tareY = rawY;
    tareBtn.classList.add('active-flash');
    setTimeout(()=>tareBtn.classList.remove('active-flash'), 400);
  });
  resetBtn.addEventListener('click', ()=>{
    tareX = 0; tareY = 0;
  });

  function startSensors(){
    window.addEventListener('deviceorientation', handleOrientation, true);
    levelUI.classList.remove('hidden');
    permGate.classList.add('hidden');
    resize();
    requestAnimationFrame(loop);
    setTimeout(()=>{
      if (!haveReading){
        footerMsg.textContent = 'No sensor data detected. Your device or browser may not support this.';
      }
    }, 2500);
  }

  function needsIOSPermission(){
    return typeof DeviceOrientationEvent !== 'undefined' &&
           typeof DeviceOrientationEvent.requestPermission === 'function';
  }

  if (needsIOSPermission()){
    permGate.classList.remove('hidden');
    permBtn.addEventListener('click', ()=>{
      DeviceOrientationEvent.requestPermission().then(state=>{
        if (state === 'granted'){
          startSensors();
        } else {
          footerMsg.textContent = 'Permission denied. Enable motion access in Settings to use the level.';
        }
      }).catch(()=>{
        footerMsg.textContent = 'Could not request sensor permission.';
      });
    });
  } else {
    startSensors();
  }
})();
</script>
</body>
</html>
